version: '3.8'

services:
  api:
    build: .
    container_name: voice-agent-api
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=development
      - PYTHONUNBUFFERED=1
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
      - ./config.yaml:/app/config.yaml
      - ./.env:/app/.env
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: voice-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
